<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDRify</title>
  <link rel="icon" href="data:">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="drop-indicator">Drop image here</div>
  
  <h1>HDRify</h1>

  <div class="app">
    <div class="controls">
      <div class="upload-zone" id="upload-zone">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p>Select an image or drop it here</p>
        <input type="file" id="file-input" accept="image/*">
      </div>
    </div>

    <div id="outputs-container">
      <!-- Output images will be inserted here dynamically -->
    </div>
  </div>

  <div class="footer">
    Created by Cristian Rivera (<a href="https://github.com/cristian-rivera/hdrify" target="_blank">View on GitHub</a>) | Inspired by <a href="https://sharpletters.net/2025/04/16/hdr-emoji/"
      target="_blank">HDR-Infused Emoji</a> by Corry Haines
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
